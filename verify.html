<!DOCTYPE html>
<html>
<head>
  <title>Verify Certificate - SoftGrowTech</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Verify Your Certificate</h1>

  <input type="text" id="certId" placeholder="Enter Certificate ID">
  <button onclick="verify()">Verify</button>

  <div id="result"></div>

  <script>
    function verify() {
      const id = document.getElementById("certId").value;

      const database = {
        "SGT001": "Gulshan Kumar - Web Development",
        "SGT002": "Rahul Sharma - Data Science",
        "SGT003": "Aman Verma - Machine Learning"
      };

      if (database[id]) {
        document.getElementById("result").innerHTML =
          "✅ Verified: " + database[id];
      } else {
        document.getElementById("result").innerHTML =
          "❌ Certificate Not Found";
      }
    }
  </script>

</body>
</html>
